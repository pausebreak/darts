name: Unit Tests 
on:
  pull_request
permissions:
  contents: read
jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v4
      - name: prepare
        run: |
          pnpm install --frozen-lockfile > /dev/null 2>&1
          pnpm test
